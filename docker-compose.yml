version: "3.8"

services:
  backend:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REDIS_URL=${REDIS_URL}
      - SITE_PASSWORD=gamja!
      - PORT=3001
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: .
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - DOCKER_ENV=true
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host
    depends_on:
      - backend
